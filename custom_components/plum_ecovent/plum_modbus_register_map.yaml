schema_version: 1
source: User Modbus table nano.md
notes:
  - Addressing follows vendor register indexes (zero-based in protocol examples).
  - Access mapping: O=R, I=W, I/O=R/W.
  - Some vendor type annotations are ambiguous (notably alarm bitfields).

metadata_keys:
  - address
  - name
  - access
  - type
  - min
  - max
  - unit
  - permission
  - enum
  - bitmask
  - scale
  - dependencies
  - notes

register_groups:
  - group: permission_settings
    description: Password and authentication payload registers
    registers:
      - address_range: [0, 15]
        name: password_utf8_payload_words
        access: R/W
        type: uint16
        min: 0
        max: 65535
        permission: User
        notes: 16 registers, 32-byte UTF-8 payload (password/session auth)

  - group: device_information
    registers:
      - address: 16
        name: program_version
        access: R
        type: uint16
        permission: User
        notes: Format SXXX.YYY (senior/junior byte semantics)
      - address_range: [17, 24]
        name: device_name_utf8_payload_words
        access: R/W
        type: uint16
        min: 0
        max: 65535
        permission: User
      - address_range: [25, 29]
        name: serial_number_utf8_payload_words
        access: R
        type: uint16
        permission: User

  - group: modbus_configuration
    registers:
      - address: 45
        name: modbus_address
        access: R/W
        type: uint8
        min: 1
        max: 247
        permission: User
      - address: 46
        name: baudrate_index
        access: R/W
        type: uint8
        min: 0
        max: 10
        permission: User
        enum:
          0: 1200
          1: 2400
          2: 4800
          3: 9600
          4: 19200
          5: 38400
          6: 57600
          7: 115200
          8: 230400
          9: 460800
          10: 921600
      - address: 47
        name: stop_bits
        access: R/W
        type: uint8
        min: 1
        max: 2
        permission: User
      - address: 48
        name: parity
        access: R/W
        type: uint8
        min: 0
        max: 2
        permission: User
        enum:
          0: none
          1: even
          2: odd

  - group: alarms
    registers:
      - address: 49
        name: alarm_table_1_low
        access: R/W
        type: bitfield16
        min: 0
        max: 65535
        permission: Mix
      - address: 50
        name: alarm_table_1_high
        access: R/W
        type: bitfield16
        min: 0
        max: 65535
        permission: Mix
      - address: 51
        name: alarm_table_2_low
        access: R/W
        type: bitfield16
        min: 0
        max: 65535
        permission: Mix
      - address: 52
        name: alarm_table_2_high
        access: R/W
        type: bitfield16
        min: 0
        max: 65535
        permission: Mix
      - address: 53
        name: alarm_table_3_low
        access: R/W
        type: bitfield16
        min: 0
        max: 65535
        permission: Mix
      - address: 54
        name: alarm_table_3_high
        access: R/W
        type: bitfield16
        min: 0
        max: 65535
        permission: Mix
        notes: Detailed bit mapping not fully available in source

alarm_bitmaps:
  table_1_low_addr_49:
    0x0004: { code: E2, title: communication_error_supply_pressure_flow_sensor }
    0x0008: { code: E3, title: communication_error_exhaust_pressure_flow_sensor }
    0x0010: { code: E4, title: supply_temperature_sensor_damaged }
    0x0020: { code: E5, title: post_exchanger_temperature_sensor_damaged }
    0x0040: { code: E6, title: exhaust_temperature_sensor_damaged }
    0x0080: { code: E7, title: supply_filter_sensor_communication_error }
    0x0100: { code: E8, title: exhaust_filter_sensor_communication_error }
    0x0200: { code: E9, title: intake_temperature_sensor_damaged }
    0x0400: { code: E10, title: extract_temperature_sensor_damaged }
    0x0800: { code: E11, title: fire_alarm_external_signal }
    0x1000: { code: E12, title: no_rotary_heat_exchanger_confirmation }
    0x2000: { code: E13, title: ghe_temperature_sensor_damaged }
    0x8000: { code: E15, title: excessive_supply_air_temperature }

  table_1_high_addr_50:
    0x0001: { code: E16, title: secondary_heater_overheat_3x, confirmation: service }
    0x0002: { code: E17, title: general_maintenance_required }
    0x0004: { code: E18, title: periodic_maintenance_approaching, confirmation: user }
    0x0008: { code: E19, title: unauthorized_startup_device_locked }
    0x0010: { code: E20, title: primary_heater_overheat_3x, confirmation: service }
    0x0020: { code: E21, title: primary_heater_thermostat_signal }
    0x0040: { code: E22, title: secondary_heater_thermostat_signal }
    0x0080: { code: E23, title: too_low_supply_air_temperature }
    0x0100: { code: E24, title: secondary_water_heater_thermostat_active }
    0x0200: { code: E25, title: primary_water_heater_thermostat_active }
    0x0800: { code: E27, title: installer_settings_error }
    0x1000: { code: E28, title: heater_thermostat_tripped }
    0x2000: { code: E29, title: heater_thermostat_tripped_3x, confirmation: service }
    0x4000: { code: E30, title: manufacturer_settings_error }
    0x8000: { code: E31, title: leading_temperature_sensor_damaged }

  table_2_low_addr_51:
    0x0004: { code: E34, title: no_supply_fan_confirmation }
    0x0008: { code: E35, title: supply_filter_replacement_approaching }
    0x0010: { code: E36, title: exhaust_filter_replacement_approaching }
    0x0020: { code: E37, title: supply_filter_contaminated }
    0x0040: { code: E38, title: exhaust_filter_contaminated }
    0x0200: { code: E41, title: emergency_mode_filters_worn }
    0x0400: { code: E42, title: filter_replacement_procedure }
    0x0800: { code: E43, title: unauthorized_modbus_parameter_modification }
    0x1000: { code: E44, title: no_exhaust_fan_confirmation }

  table_2_high_addr_52:
    0x0020: { code: E53, title: unit_alarm }
    0x0040: { code: E54, title: no_supply_fan_confirmation_service }
    0x0080: { code: E55, title: no_exhaust_fan_confirmation_service }
    0x0100: { code: E56, title: unit_defrost_alarm }
    0x0200: { code: E57, title: humidity_sensor_error }
    0x0400: { code: E58, title: co2_sensor_error }
    0x0800: { code: E59, title: multiplexer_communication_error }
    0x1000: { code: E60, title: constant_flow_pressure_sensor_error }
    0x2000: { code: E61, title: no_humidity_reading_no_panel_connection }
    0x4000: { code: E62, title: leading_temperature_reading_error_no_panel_connection }
    0x8000: { code: E63, title: auto_mode_air_quality_sensor_error }

  table_3_low_addr_53:
    0x0001: { code: E64, title: smoke_detector_signal_active }
    0x0002: { code: E65, title: condensate_pump_failure_alarm }
    0x0004: { code: E66, title: post_primary_heater_sensor_damaged }
    0x0008: { code: E67, title: post_secondary_heater_sensor_damaged }
    0x0010: { code: E68, title: primary_heater_temp_exceeded }
    0x0020: { code: E69, title: secondary_heater_temp_exceeded_or_related_alarm }


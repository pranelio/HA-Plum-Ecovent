  - { address: 237, name: secondary_heater_type, access: R, type: uint8, permission: User, enum: { 0: none, 1: electric, 2: water } }
  - { address: 238, name: secondary_heater_status, access: R, type: uint8, min: 0, max: 1, permission: User }
  - { address: 239, name: secondary_heater_current_control, access: R, type: uint16, min: 0, max: 1000, permission: User, scale: 0.1, unit: percent }
  - { address: 240, name: secondary_heater_overtemperature, access: R, type: uint8, permission: User }

  - { address: 241, name: preheater_type, access: R, type: uint8, permission: User, enum: { 0: none, 1: electric, 2: water } }
  - { address: 242, name: preheater_status, access: R, type: uint8, min: 0, max: 1, permission: User }
  - { address: 243, name: preheater_current_control, access: R, type: uint16, min: 0, max: 1000, permission: User, scale: 0.1, unit: percent }
  - { address: 244, name: preheater_overtemperature, access: R, type: uint8, permission: User }

  - { address: 245, name: control_mode, access: R, type: uint8, permission: User, enum: { 0: standard, 1: constant_pressure, 2: constant_flow } }
  - { address: 246, name: supply_fan_operation, access: R, type: uint8, permission: User }
  - { address: 247, name: supply_fan_current_control, access: R, type: uint8, permission: User, unit: percent }
  - { address: 248, name: extract_fan_operation, access: R, type: uint8, permission: User }
  - { address: 249, name: extract_fan_current_control, access: R, type: uint8, permission: User, unit: percent }

  - { address: 250, name: bypass_current_control, access: R, type: uint16, min: 0, max: 1000, permission: User, scale: 0.1, unit: percent }
  - { address: 251, name: aggregate_state, access: R, type: uint8, min: 0, max: 2, permission: User, enum: { 0: off, 1: heating, 2: cooling } }
  - { address: 252, name: bypass_state, access: R, type: uint8, min: 0, max: 1, permission: User, enum: { 0: off, 1: on } }

integration:
  notes:
    - This section is the runtime source of truth for entity mapping and discovery metadata.
    - Each entity should reference a canonical register by `register` (from top-level `registers`) instead of duplicating `address` metadata.
    - Groups are internal-only development tags; an entity can belong to multiple groups.

  device_settings_groups:
    supply_fan:
      label: Supply fan speeds
      keys: [supply_fan_speed_g1, supply_fan_speed_g2, supply_fan_speed_g3]
    exhaust_fan:
      label: Extract fan speeds
      keys: [exhaust_fan_speed_g1, exhaust_fan_speed_g2, exhaust_fan_speed_g3]
    auto_control:
      label: Auto control
      keys: [auto_minimum_fan_speed, auto_maximum_fan_speed]
    boost:
      label: Boost settings
      keys: [boost_supply_speed, boost_extract_speed, boost_duration]
    temperature:
      label: Temperature settings
      keys: [comfort_temperature_day, comfort_temperature_night, winter_mode_activation_temperature, summer_mode_activation_temperature]

  entities:
    - platform: binary_sensor
      register: ghe_status
      name: Ground Heat Exchanger Status
      key: heat_exchanger_status
      entity_category: diagnostic
      icon: mdi:pipe-valve
      groups: [implemented, hvac, diagnostics, ghe]
    - platform: binary_sensor
      register: ghe_regeneration_status
      name: Ground Heat Exchanger Regeneration Status
      key: heat_exchanger_regeneration
      entity_category: diagnostic
      skip_updates: 5
      icon: mdi:recycle
      groups: [implemented, hvac, diagnostics, ghe]
    - platform: binary_sensor
      register: supply_filter_replacement_needed
      name: Supply Filter Replacement Required
      key: supply_filter_replacement_needed
      device_class: problem
      entity_category: diagnostic
      notification: true
      skip_updates: 5
      icon: mdi:air-filter
      groups: [implemented, hvac, diagnostics, filters]
    - platform: binary_sensor
      register: extract_filter_replacement_needed
      name: Extract Filter Replacement Required
      key: extract_filter_replacement_needed
      device_class: problem
      entity_category: diagnostic
      notification: true
      skip_updates: 5
      icon: mdi:air-filter
      groups: [implemented, hvac, diagnostics, filters]
    - platform: binary_sensor
      register: secondary_heater_status
      name: Secondary Heater Status
      key: secondary_heater_status
      entity_category: diagnostic
      optional: true
      icon: mdi:radiator
      groups: [implemented, hvac, diagnostics, heater, optional]
    - platform: binary_sensor
      register: secondary_heater_overtemperature
      name: Secondary Heater Overtemperature Alarm
      key: secondary_heater_overtemperature
      device_class: problem
      entity_category: diagnostic
      notification: true
      optional: true
      icon: mdi:alert-circle
      groups: [implemented, hvac, diagnostics, heater, optional]
    - platform: binary_sensor
      register: preheater_status
      name: Preheater Status
      key: preheater_status
      entity_category: diagnostic
      optional: true
      icon: mdi:radiator-disabled
      groups: [implemented, hvac, diagnostics, heater, optional]
    - platform: binary_sensor
      register: preheater_overtemperature
      name: Preheater Overtemperature Alarm
      key: preheater_overtemperature
      device_class: problem
      entity_category: diagnostic
      notification: true
      optional: true
      icon: mdi:alert-circle
      groups: [implemented, hvac, diagnostics, heater, optional]
    - platform: binary_sensor
      register: supply_fan_operation
      name: Supply Fan Status
      key: supply_fan_status
      entity_category: diagnostic
      icon: mdi:fan
      groups: [implemented, hvac, diagnostics, fan]
    - platform: binary_sensor
      register: extract_fan_operation
      name: Extract Fan Status
      key: extract_fan_status
      entity_category: diagnostic
      icon: mdi:fan
      groups: [implemented, hvac, diagnostics, fan]

    - platform: switch
      register: unit_on_off
      name: Unit Enable
      key: on_off
      icon: mdi:power
      groups: [implemented, hvac, control]
    - platform: switch
      register: additional_equipment_enable_mask
      name: Additional Equipment Enable Mask
      key: secondary_heater
      bitmask: 4
      entity_category: config
      skip_updates: 5
      optional: true
